name: rs-pre-breakout-compression-radar

on:
  workflow_dispatch:
  schedule:
    - cron: "19 23 * * 0-4"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance lxml html5lib beautifulsoup4

      - name: 유니버스 생성
        run: python build_universe_from_sp.py

      - name: 레이더 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python rs_pre_breakout_compression_radar.py
